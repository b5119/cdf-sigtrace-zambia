name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        working-directory: src/backend
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt "pydantic[email]" aiosqlite
      - name: Run tests
        working-directory: src/backend
        run: python -m pytest tests/ -q

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Hardhat tests
        working-directory: src/contracts
        run: |
          npm ci
          npx hardhat test

  frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend-public-app, frontend-oversight-app, pulse-pwa-app]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build ${{ matrix.app }}
        working-directory: src/${{ matrix.app }}
        run: |
          npm ci
          npm run build
